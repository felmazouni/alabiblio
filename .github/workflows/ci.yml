name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm exec tsx scripts/check-text-frontiers.ts
      - run: pnpm exec tsx scripts/check-foreign-keys.ts
      - run: pnpm build
      - run: pnpm exec tsx scripts/check-architecture.ts
      - run: pnpm exec tsx scripts/check-performance.ts
      - run: pnpm exec tsx tests/e2e/app-flow.check.ts
